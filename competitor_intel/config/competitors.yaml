competitors:

  - name: neuralframes
    display: NeuralFrames
    aliases:
      - "Neural Frames"
      - "NeuralFrames"
    domains:
      - "neuralframes.com"
    giq:
      - "本周期有哪些新 SEO 落地页或内容发布？"
      - "付费广告素材或落地页有变化吗？"
      - "定价 / Free tier 有调整吗？"
      - "有没有新的 KOL/Creator 合作或社媒高互动内容？"
      - "产品有新版本或重大功能更新吗？"
    monitoring:
      priority: full
      action_scope:
        - website
        - product
        - pricing
        - seo_content
        - social
        - paid_ads
        - reviews
        - creator
        - partnerships
        - media
        - developer
      state_mode: structured_crud
      change_types:
        - created
        - content_updated
        - commercial_updated
        - removed
        - metadata_only
        - unverified
      deletion_confirmation_runs: 2
      mass_lastmod_threshold: 200
      sitemap_policy: "URL 新增/消失可作为线索；lastmod 单独变化不得写成内容更新"
      content_policy: "关键页每次提取；文章页建立轻量指纹；正文变化时才保留前后压缩文本"
    sources:
      website:
        pages:
          - https://www.neuralframes.com/
          - https://www.neuralframes.com/pricing
          - https://www.neuralframes.com/blog
          - https://www.neuralframes.com/product
          - https://www.neuralframes.com/about
          - https://www.neuralframes.com/shortform-studio
          - https://www.neuralframes.com/ai-music-video-generator
          - https://www.neuralframes.com/features/autopilot
          - https://www.neuralframes.com/tunes
        discovery_paths:
          - sitemap
          - rss
          - changelog
          - help_center
          - newsletter_archive
      social:
        x:
          account_url: https://x.com/neuralframes
          search_terms: ["NeuralFrames", "\"Neural Frames\"", "neuralframes.com"]
        youtube:
          channel_url: null
          search_terms: ["NeuralFrames", "\"Neural Frames\""]
        linkedin:
          company_url: null
          people_urls: []
          search_terms: ["NeuralFrames", "\"Neural Frames\""]
        tiktok:
          account_url: null
          search_terms: ["NeuralFrames", "\"Neural Frames\""]
        instagram:
          account_url: null
          search_terms: ["NeuralFrames", "\"Neural Frames\""]
      launch_and_distribution:
        product_hunt_url: null
        marketplaces: []
        search_terms:
          - "NeuralFrames launch"
          - "\"Neural Frames\" partnership"
          - "NeuralFrames integration"
      reviews:
        g2_url: null
        trustpilot_url: https://www.trustpilot.com/review/neuralframes.com
        capterra_url: null
        app_store_url: null
        google_play_url: null
      media:
        search_terms:
          - "NeuralFrames interview"
          - "\"Neural Frames\" funding"
          - "NeuralFrames ARR"
          - "NeuralFrames revenue"
      github:
        repo: null  # 闭源，跳过
      reddit:
        keywords:
          - "neuralframes"
          - "neural frames"
        subreddits:
          - "AIVideo"
          - "artificial"
          - "VideoEditing"
          - "midjourney"
      ads:
        meta_page_id: null  # 待补充
        search_name: "NeuralFrames"
        advertiser_names:
          - "NeuralFrames"
          - "Neural Frames"
        domains:
          - "neuralframes.com"
      hn:
        keywords:
          - "neuralframes"
          - "neural frames"

