# Article landing page agent generation template
#
# This is the agent-facing skeleton for generating article landing pages.
# The AI / skill layer must use this file as the starting structure and
# replace every [...] placeholder with content derived from the user's
# product and page description.
#
# IMPORTANT: Do NOT read or copy prose from reference-example.yaml.
# reference-example.yaml is a human-readable filled example only.
# This template is the source of truth for agent generation.
#
# URL conventions:
# - Product-owned URLs (canonical, CTA, og_image, home_url) may use
#   https://example.com/... placeholders when the user has not supplied real URLs.
# - External reference URLs in media_blocks, sources, and related must be real,
#   verified URLs from the user or from research. Do not fabricate URLs.
# - If no real external URLs are available, keep sources and related as empty
#   arrays (`[]`). Do not omit them, or the renderer will fall back to defaults.
# - Do not use Jinja2 expressions ({{...}}) in the generated content YAML that
#   is passed to `ogi`. Replace them with plain strings before saving.

canonical_url: "https://example.com/[SLUG].html"
title: "[PAGE NAME]"
meta_description: "[PAGE DESCRIPTION]"
category: "Guide"
author: "[PRODUCT NAME]"
publish_date: "[CURRENT DATE IN ISO 8601]"
read_time: "8 min read"
article_lede: "[PAGE DESCRIPTION]"
article_default_theme: "dark"
article_theme_options:
  - id: "dark"
    label: "Dark"
  - id: "paper"
    label: "Paper"

hero_visual:
  alt: "Code-generated painterly hero image for [PAGE NAME]"
  label: "Painterly hero frame"
