<header class="top">
  <div class="top-in">
    <a href="{{ home_url | default(canonical_url, true) }}" class="nav-logo">{{ brand_name }}</a>
    <nav class="page-nav">
      {% if nav_items %}
      {% for item in nav_items %}
      <a href="{{ item.url }}">{{ item.label }}</a>
      {% endfor %}
      {% endif %}
      <a href="{{ cta_url | default(canonical_url ~ '#start', true) }}" class="nav-cta">{{ nav_cta | default('Get started') }}</a>
      {% if article_theme_options %}
      <div class="theme-switcher" aria-label="Article style theme">
        {% for theme in article_theme_options %}
        <button type="button" class="theme-option{% if theme.id == article_default_theme %} active{% endif %}" data-theme-choice="{{ theme.id }}">
          <span>{{ theme.label }}</span>
        </button>
        {% endfor %}
      </div>
      {% endif %}
    </nav>
  </div>
</header>
