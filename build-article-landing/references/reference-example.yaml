# Article landing page reference instance
#
# This is the standard data template for the article landing page type.
# The CLI loads this file and replaces Jinja2-style placeholders
# ({{product_name}}, {{page_name}}, {{page_description}}, {{product_description}},
# {{canonical_url}}, {{publish_date}}) with the actual build request values.
# AI / Skill layer can use this as the target structure when converting user
# input into structured content.
#
# URL conventions:
# - Product-owned URLs (canonical, CTA, sources/related entries for the product)
#   may use https://example.com/... placeholders when the user has not supplied
#   real URLs. The skill layer must replace them with real URLs before finalizing.
# - External reference URLs in media_blocks, sources, and related must be real,
#   verified URLs from the user or from research. Do not fabricate URLs.

canonical_url: "{{canonical_url}}"
title: "{{page_name}}"
meta_description: "{{page_description}}"
category: "Guide"
author: "{{product_name}}"
publish_date: "{{publish_date | default('2026-06-30')}}"
read_time: "8 min read"
article_lede: "{{page_description}}"
article_default_theme: "dark"
article_theme_options:
  - id: "dark"
    label: "Dark"
  - id: "paper"
    label: "Paper"

hero_visual:
  alt: "Code-generated painterly hero image for {{page_name}}"
  label: "Painterly hero frame"
  badge: "AI"
  colors:
    - "#0b2a7a"
    - "#d4d4d8"
    - "#c47a00"

article_sections:
  - title: "Introduction"
    content: |
      <p>{{page_name}} is one of the most searched topics by creators who want to move faster without sacrificing quality. Whether you are just getting started or looking to upgrade your current workflow, this guide gives you a practical, no-fluff overview of the landscape.</p>
      <p>This article demonstrates the expected structure for a stronger SEO page: useful sections, a comparison table, short reviews, generated media blocks, and outbound references readers can inspect.</p>
  - title: "Why {{page_name}} matters"
    content: |
      <p>Creators today face two competing pressures: produce more content and keep it original. {{page_name}} sits at the intersection of speed and creativity. A well-chosen tool can cut production time while giving your work a more polished, professional feel.</p>
      <p>{{product_name}} focuses on repeatable, SEO-ready pages because the right guide at the right search moment can drive long-term traffic. Media and external references make that guide more useful than text alone.</p>
  - title: "What to look for"
    content: |
      <p>Before picking an option, focus on five practical criteria:</p>
      <ul>
        <li><strong>Workflow clarity:</strong> The tool should take you from input to output in a predictable number of steps.</li>
        <li><strong>Export flexibility:</strong> Make sure the output format matches the platforms you publish on.</li>
        <li><strong>Fair pricing:</strong> Free tiers are useful for testing, but paid plans should scale transparently.</li>
        <li><strong>Support and documentation:</strong> Active docs, tutorials, and a responsive team save hours later.</li>
        <li><strong>Source quality:</strong> Check product pages, demos, public documentation, and independent references before committing.</li>
      </ul>
  - title: "How to choose the right option"
    content: |
      <p>The best choice depends on where you are in your creator journey. If you are experimenting, start with a free or low-cost option and focus on learning the workflow. If you are producing regularly, invest in a tool with batch exports, templates, and collaboration features.</p>
      <p>Use the comparison table, reviews, media examples, and outbound sources below as a shortcut. Match the tool strengths to your most common use case, then run a small test project before making a long-term decision.</p>
  - title: "Final thoughts"
    content: |
      <p>{{page_name}} is not a one-size-fits-all decision. The right tool is the one that removes friction from your specific workflow. Start small, measure results, and iterate.</p>
      <p>If you want a dedicated landing page for your own product, {{product_name}} can help you turn that idea into a publish-ready page quickly.</p>

comparison_table:
  title: "Side-by-side comparison"
  html: |
    <table class="comparison-table">
      <thead>
        <tr>
          <th scope="col">Feature</th>
          <th scope="col">Tool A</th>
          <th scope="col">Tool B</th>
          <th scope="col">Tool C</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th scope="row">Best for</th>
          <td>Beginners</td>
          <td>Professional creators</td>
          <td>Budget-conscious users</td>
        </tr>
        <tr>
          <th scope="row">Starting price</th>
          <td>Free</td>
          <td>$12 / month</td>
          <td>$9 / month</td>
        </tr>
        <tr>
          <th scope="row">Export formats</th>
          <td>MP4, GIF</td>
          <td>MP4, MOV, WebM</td>
          <td>MP4</td>
        </tr>
        <tr>
          <th scope="row">Browser-based</th>
          <td>Yes</td>
          <td>Yes</td>
          <td>Yes</td>
        </tr>
      </tbody>
    </table>

tool_reviews:
  - name: "Tool A"
    score: "4.5 / 5"
    content: "<p>Tool A is the easiest way to get started. The interface is clean, the free tier is generous, and the export options cover the basics.</p>"
    pros:
      - "No installation required"
      - "Fast generation speed"
      - "Beginner-friendly templates"
    cons:
      - "Limited advanced customization"
      - "Fewer export formats than premium tools"
  - name: "Tool B"
    score: "4.8 / 5"
    content: "<p>Tool B targets professional creators who need control and flexibility. The template library is large, the export options are broad, and the collaboration features make it suitable for teams.</p>"
    pros:
      - "Rich template library"
      - "Multiple export formats"
      - "Team collaboration features"
    cons:
      - "Higher starting price"
      - "Steeper learning curve"
  - name: "Tool C"
    score: "4.2 / 5"
    content: "<p>Tool C is the budget pick that still delivers solid results. It covers the core workflow well and works for solo creators who want predictable costs.</p>"
    pros:
      - "Affordable pricing"
      - "Simple workflow"
      - "Reliable core features"
    cons:
      - "Smaller template library"
      - "Basic customization options"

quick_tips:
  title: "Quick-start tips"
  content: |
    <ol>
      <li><strong>Start with one use case.</strong> Pick the single workflow you repeat most often and test it end to end.</li>
      <li><strong>Use generated visuals.</strong> Add lightweight media blocks so the article is not only text.</li>
      <li><strong>Export early and often.</strong> Verify that the output works on your target platform before investing heavily.</li>
      <li><strong>Check external sources.</strong> Product details and pricing can change quickly.</li>
    </ol>

media_blocks:
  - type: generated_image
    title: "Generated workflow visual"
    caption: "A code-rendered image block that gives the article a visual anchor without requiring uploaded assets."
    alt: "Colorful generated workflow image"
    badge: "AI"
    colors:
      - "#a7db68"
      - "#38bdf8"
      - "#f97316"
  - type: generated_image
    title: "Generated comparison visual"
    caption: "A second visual placeholder for comparison, campaign, or tutorial sections."
    alt: "Colorful generated comparison image"
    badge: "SEO"
    colors:
      - "#f472b6"
      - "#22c55e"
      - "#facc15"
  - type: youtube
    label: "YouTube"
    title: "YouTube research link"
    caption: "Use current YouTube results to inspect demos, walkthroughs, and creator examples."
    url: "https://www.youtube.com/results?search_query=AI+creator+tools"
    alt: "YouTube research link card"
  - type: external_link
    label: "Reference"
    title: "Wikipedia reference"
    caption: "Use stable reference links when they help readers understand the topic."
    url: "https://en.wikipedia.org/wiki/Search_engine_optimization"

inline_cta:
